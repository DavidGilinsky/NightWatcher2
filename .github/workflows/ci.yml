# Purpose:       GitHub Actions CI: amd64 build/test and arm64 cross-compile.
# Created:       2026-07-18
# Last Modified: 2026-07-18
# Version:       0.1.0
# ---------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & test (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Smoke-run daemon
        run: ./build/nightwatcherd --version

  cross-arm64:
    name: Cross-compile (arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++-aarch64-linux-gnu
      - name: Configure
        run: >
          cmake -B build-arm64
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-aarch64.cmake
          -DNW_BUILD_TESTS=OFF
      - name: Build
        run: cmake --build build-arm64 --parallel
